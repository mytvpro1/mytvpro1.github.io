<!DOCTYPE html>
<html lang="en" dir="ltr" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYTVPRO - Simo Global Edition</title>
    
    <script src="https://millionairelucidlytransmitted.com/3a/8c/c1/3a8cc133791bde8e0230332b817de46a.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        body { background-color: #0b0e11; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; transition: 0.3s; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 2%; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .logo { color: #ff3b5c; font-size: 24px; font-weight: bold; text-decoration: none; cursor: pointer; }
        .lang-container { display: flex; gap: 12px; align-items: center; }
        .lang-btn { color: #ff3b5c; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; text-transform: uppercase; }
        .lang-btn.active { color: #ffffff; border-bottom: 2px solid #ff3b5c; }
        .nav-tabs { display: flex; gap: 15px; }
        .tab { background: #1a1d21; color: white; padding: 8px 25px; border-radius: 20px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .tab.active { background: #ff3b5c; }
        .live-section { text-align: center; margin: 20px 0; padding: 15px; background: #1a1d21; border-radius: 15px; border: 1px solid #333; }
        .main-live-selector { background: #0b0e11; border: 2px solid #ff3b5c; border-radius: 50px; display: inline-flex; align-items: center; padding: 10px 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 59, 92, 0.2); }
        .live-dot { height: 10px; width: 10px; background-color: #ff0000; border-radius: 50%; margin-right: 10px; animation: blink 1s infinite; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; backdrop-filter: blur(5px); }
        .channels-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 500px; max-height: 80vh; background: #1a1d21; border: 2px solid #ff3b5c; border-radius: 20px; z-index: 3001; padding: 25px; overflow-y: auto; }
        .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .channel-card { background: #000; border-radius: 12px; padding: 10px; cursor: pointer; border: 1px solid #222; text-align: center; transition: 0.3s; }
        .channel-card img { width: 50px; height: 40px; object-fit: contain; margin-bottom: 8px; }
        .search-bar { width: 100%; max-width: 600px; margin: 0 auto 20px; }
        .search-bar input { width: 100%; padding: 12px 25px; border-radius: 25px; border: 1px solid #333; background: #1a1d21; color: white; outline: none; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 0 2%; }
        .movie-card { background: #1a1d21; border-radius: 12px; overflow: hidden; border: 1px solid #222; cursor: pointer; }
        .movie-card img { width: 100%; height: 220px; object-fit: cover; }
        #videoPlayerContainer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 4000; padding: 40px 0; text-align: center; overflow-y: auto; }
        #mainPlayer, #liveVideoPlayer { width: 90%; max-width: 800px; height: 50vh; border: 3px solid #ff3b5c; border-radius: 15px; background: #000; margin: 0 auto; }
        .ad-banner-box { width: 90%; max-width: 728px; min-height: 90px; margin: 20px auto; }
        .disclaimer-section { background: #1a1d21; border-top: 2px solid #ff3b5c; padding: 30px 5%; margin-top: 50px; font-size: 12px; color: #888; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="modalOverlay" class="modal-overlay" onclick="closeChannelsModal()"></div>
    <div id="channelsModal" class="channels-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="color:#ff3b5c; margin:0;">MYTVPRO LIVE</h3>
            <button onclick="closeChannelsModal()" style="background:#ff3b5c; color:white; border:none; padding:5px 12px; border-radius:5px; cursor:pointer;">X</button>
        </div>
        <div style="display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center;">
            <button class="tab" style="font-size: 10px; padding: 5px 10px;" id="btn-ar-sport" onclick="fetchChannels('ar_sport', 'btn-ar-sport')">AR Sport</button>
            <button class="tab" style="font-size: 10px; padding: 5px 10px;" id="btn-fr-sport" onclick="fetchChannels('fr_sport', 'btn-fr-sport')">FR Sport</button>
            <button class="tab" style="font-size: 10px; padding: 5px 10px;" id="btn-ar-news" onclick="fetchChannels('ar_news', 'btn-ar-news')">News</button>
        </div>
        <div id="channelsGrid" class="channels-grid"></div>
    </div>

    <div id="videoPlayerContainer">
        <button class="tab" id="backBtn" onclick="closePlayer()">BACK</button>
        <div class="ad-banner-box">
            <script>atOptions = { 'key' : '3c7ca9cd02f9ed4fece203c54d5491cd', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };</script>
            <script src="https://millionairelucidlytransmitted.com/3c7ca9cd02f9ed4fece203c54d5491cd/invoke.js"></script>
        </div>
        <iframe id="mainPlayer" src="" allowfullscreen style="display:none;"></iframe>
        <video id="liveVideoPlayer" controls style="display:none;"></video>
    </div>

    <div class="header">
        <div class="logo" onclick="location.reload()">MYTVPRO</div>
        <div class="nav-tabs">
            <button id="btnMovies" class="tab active" onclick="loadContent('movie')">Movies</button>
            <button id="btnSeries" class="tab" onclick="loadContent('tv')">Series</button>
        </div>
        <div class="lang-container">
            <span class="lang-btn active" id="lang-en" onclick="changeLanguage('en')">EN</span>
            <span class="lang-btn" id="lang-fr" onclick="changeLanguage('fr')">FR</span>
            <span class="lang-btn" id="lang-de" onclick="changeLanguage('de')">DE</span>
            <span class="lang-btn" id="lang-nl" onclick="changeLanguage('nl')">NL</span>
        </div>
    </div>

    <div class="live-section">
        <div class="main-live-selector" onclick="openChannelsModal()">
            <span class="live-dot"></span>
            <span id="liveTxt">Select Live Channel / LIVE TV</span>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search here..." onkeyup="handleSearch(event)">
    </div>

    <div class="movie-grid" id="moviesGrid"></div>

    <footer class="disclaimer-section">
        <p>© 2026 MYTVPRO - Simo Global Edition. All Rights Reserved.</p>
    </footer>

    <script>
        const API_KEY = '715fb05852af662217013d8380237f2a';
        let currentType = 'movie', currentLang = 'en', hlsPlayer = null;

        const translations = {
            en: { movies: "Movies", series: "Series", live: "Select Live Channel", search: "Search here...", back: "Back" },
            fr: { movies: "Films", series: "Séries", live: "Choisir la chaîne", search: "Chercher ici...", back: "Retour" },
            de: { movies: "Filme", series: "Serien", live: "Kanal wählen", search: "Hier suchen...", back: "Zurück" },
            nl: { movies: "Films", series: "Series", live: "Kies Kanaal", search: "Zoek هنا...", back: "Terug" }
        };

        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            const t = translations[lang] || translations.en;
            document.getElementById('btnMovies').innerText = t.movies;
            document.getElementById('btnSeries').innerText = t.series;
            document.getElementById('liveTxt').innerText = t.live;
            document.getElementById('searchInput').placeholder = t.search;
            document.getElementById('backBtn').innerText = t.back;
            loadContent(currentType);
        }

        async function loadContent(type) {
            currentType = type;
            document.getElementById('btnMovies').classList.toggle('active', type === 'movie');
            document.getElementById('btnSeries').classList.toggle('active', type === 'tv');
            const res = await fetch(`https://api.themoviedb.org/3/${type}/popular?api_key=${API_KEY}&language=${currentLang}&page=1`);
            const data = await res.json();
            document.getElementById('moviesGrid').innerHTML = data.results.map(item => `
                <div class="movie-card" onclick="openPlayer('${item.id}')">
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
                    <div style="padding:10px; font-size:13px; text-align:center;">${item.title || item.name}</div>
                </div>`).join('');
        }

        async function fetchChannels(category, btnId) {
            document.querySelectorAll('#channelsModal .tab').forEach(b => b.classList.remove('active'));
            if(btnId) document.getElementById(btnId).classList.add('active');
            
            try {
                const res = await fetch('links.json?t=' + Date.now());
                const data = await res.json();
                const grid = document.getElementById('channelsGrid');
                grid.innerHTML = '';
                let channels = data[category] || [];
                if(channels.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/-1;">No channels found.</p>';
                    return;
                }
                channels.forEach(ch => {
                    grid.innerHTML += `
                        <div class="channel-card" onclick="startStream('${ch.url}')">
                            <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/50'">
                            <div style="font-size:10px; color:white;">${ch.name}</div>
                        </div>`;
                });
            } catch (e) { console.log("Check links.json"); }
        }

        function openPlayer(id) {
            document.getElementById('liveVideoPlayer').style.display = 'none';
            const player = document.getElementById('mainPlayer');
            player.style.display = 'block';
            player.src = `https://vidsrc.me/embed/${currentType}?tmdb=${id}`;
            document.getElementById('videoPlayerContainer').style.display = 'block';
        }

        function startStream(url) {
            closeChannelsModal();
            document.getElementById('mainPlayer').style.display = 'none';
            const video = document.getElementById('liveVideoPlayer');
            video.style.display = 'block';
            if (hlsPlayer) hlsPlayer.destroy();
            if (Hls.isSupported()) {
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = url;
                video.play();
            }
            document.getElementById('videoPlayerContainer').style.display = 'block';
        }

        function closePlayer() {
            document.getElementById('videoPlayerContainer').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
            document.getElementById('liveVideoPlayer').pause();
        }

        function openChannelsModal() { 
            document.getElementById('modalOverlay').style.display = 'block'; 
            document.getElementById('channelsModal').style.display = 'block';
            fetchChannels('ar_sport', 'btn-ar-sport'); 
        }
        function closeChannelsModal() { 
            document.getElementById('modalOverlay').style.display = 'none'; 
            document.getElementById('channelsModal').style.display = 'none'; 
        }

        window.onload = () => loadContent('movie');
    </script>
</body>
</html>
