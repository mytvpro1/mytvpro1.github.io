<!DOCTYPE html>
<html lang="ro" dir="ltr">
<head>
    <title>MYTVPRO - Watch Movies & Series Online Free</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch the latest movies and series online for free on MYTVPRO.">
    
    <link rel="icon" type="image/x-icon" href="https://mytvpro1.github.io/favicon.ico">
    <script>
      if (window.location.hostname.includes("github.io")) {
        window.location.replace("https://mytvpro.mytvpropagesdev.workers.dev/");
      }
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9MPJ06VFY0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9MPJ06VFY0');
      document.addEventListener('contextmenu', event => event.preventDefault());
    </script>

    <style>
        :root { --main-red: #ff3b5c; --bg-dark: #0b0e11; --card-bg: #1a1d21; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; user-select: none; }
        
        /* شاشة التحميل */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; z-index: 100000; transition: 0.5s; }
        .progress-container { width: 200px; height: 4px; background: #222; border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--main-red); box-shadow: 0 0 10px var(--main-red); }

        /* التصميم المطابق للصورة */
        .header { text-align: center; padding: 20px 0; }
        .logo { color: var(--main-red); font-size: 30px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        
        .lang-switch { margin-top: 5px; font-size: 12px; font-weight: bold; }
        .lang-switch span { cursor: pointer; padding: 0 5px; color: #888; }
        .lang-switch span.active { color: #fff; border-bottom: 2px solid var(--main-red); }

        .nav-tabs { display: flex; gap: 10px; justify-content: center; margin: 20px 0; overflow-x: auto; padding-bottom: 5px; }
        .tab { background: var(--card-bg); color: #fff; padding: 10px 25px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .tab.active { background: var(--main-red); }
        .tab.featured { background: var(--main-red); display: flex; align-items: center; gap: 5px; }

        .search-container { text-align: center; margin-bottom: 25px; }
        .search-container input { width: 90%; max-width: 500px; padding: 14px 20px; border-radius: 30px; border: 1px solid #222; background: #16191d; color: #fff; outline: none; font-size: 16px; }

        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px; }
        @media (min-width: 600px) { .movie-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .movie-title { padding: 10px; font-size: 13px; text-align: center; font-weight: 500; color: #ccc; }

        /* مشغل الفيديو */
        #videoPlayerContainer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #mainPlayer { width: 100%; height: 100%; border: none; }
        .ad-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10001; cursor: pointer; }
        .close-player { position: absolute; top: 20px; left: 20px; background: var(--main-red); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 10002; cursor: pointer; }

        .show-more { text-align: center; margin: 30px 0; }
        .show-more button { background: transparent; border: 2px solid var(--main-red); color: var(--main-red); padding: 10px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="splash-screen"><div class="progress-container"><div id="progress-bar"></div></div></div>

    <div class="header">
        <div class="logo">MYTVPRO</div>
        <div class="lang-switch">
            <span class="active" onclick="setLang('en')">EN</span>
            <span onclick="setLang('ar')">AR</span>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab active featured" onclick="loadFeatured()">⭐ Featured</button>
        <button class="tab" onclick="loadContent('movie')">Movies</button>
        <button class="tab" onclick="loadContent('tv')">Series</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search..." onkeyup="handleSearch(event)">
    </div>

    <div id="moviesGrid" class="movie-grid"></div>

    <div class="show-more">
        <button onclick="loadMore()">Show More</button>
    </div>

    <div id="videoPlayerContainer">
        <button class="close-player" onclick="closePlayer()">CLOSE</button>
        <div id="adOverlay" class="ad-overlay" onclick="triggerAd()"></div>
        <iframe id="mainPlayer" allowfullscreen></iframe>
    </div>

    <script>
        // مفتاح API المستخرج من كودك
        const API_KEY = atob("YWNkOWQ4OGE4M2I1MjcyNTg4ZDIxZDViNDQwMWVhYjY=");
        
        // نظام الإعلانات (ساعة ونصف)
        function triggerAd() {
            window.open("https://rm358.com/4/10722756", "_blank");
            localStorage.setItem('lastAd', new Date().getTime());
            document.getElementById('adOverlay').style.display = 'none';
        }

        function openPlayer(id, type) {
            const now = new Date().getTime();
            const lastAd = localStorage.getItem('lastAd');
            const overlay = document.getElementById('adOverlay');
            
            // تفعيل الإعلان فقط إذا مر 90 دقيقة
            if (!lastAd || (now - lastAd > 90 * 60 * 1000)) {
                overlay.style.display = 'block';
            } else {
                overlay.style.display = 'none';
            }

            document.getElementById('mainPlayer').src = `https://vidsrc.me/embed/${type}?tmdb=${id}`;
            document.getElementById('videoPlayerContainer').style.display = 'block';
        }

        function closePlayer() {
            document.getElementById('videoPlayerContainer').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
        }

        // جلب البيانات الأساسية
        async function loadFeatured() {
            const ids = [93405, 1396, 157336, 634649, 100088, 71446];
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = "";
            for(let id of ids) {
                const type = id > 100000 ? 'movie' : 'tv';
                const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}`);
                const m = await res.json();
                grid.innerHTML += renderCard(m, type);
            }
        }

        function renderCard(m, type) {
            return `
                <div class="movie-card" onclick="openPlayer('${m.id}', '${type}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" alt="${m.title || m.name}">
                    <div class="movie-title">${m.title || m.name}</div>
                </div>`;
        }

        async function loadContent(type) {
            const res = await fetch(`https://api.themoviedb.org/3/${type}/popular?api_key=${API_KEY}`);
            const data = await res.json();
            document.getElementById('moviesGrid').innerHTML = data.results.map(m => renderCard(m, type)).join('');
        }

        // تشغيل شاشة التحميل
        window.onload = () => {
            loadFeatured();
            let w = 0;
            const bar = document.getElementById('progress-bar');
            const iv = setInterval(() => {
                w += 10; bar.style.width = w + '%';
                if(w >= 100) {
                    clearInterval(iv);
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
                }
            }, 50);
        };
    </script>
</body>
</html>
