    <style>

        .logo { color: var(--main-red); font-size: 24px; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
        .lang-container { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .lang-btn { color: var(--main-red); font-weight: bold; cursor: pointer; font-size: 10px; padding: 4px; transition: 0.3s; text-transform: uppercase; }

        .footer-install-btn { display: inline-flex; align-items: center; background: var(--main-red); color: white; padding: 12px 35px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 13px; cursor: pointer; border: none; }

<body>

    <div id="splash-screen">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div class="header">
        <div class="logo" onclick="location.reload()">MYTVPRO</div>
        <div class="lang-container">
            <span class="lang-btn active" onclick="changeLanguage('en', this)">EN</span>
            <span class="lang-btn" onclick="changeLanguage('ar', this)">AR</span>
            <span class="lang-btn" onclick="changeLanguage('ro', this)">RO</span>
        </div>
    </div>

    <div class="nav-tabs">
        <button id="btnFeatured" class="tab active" onclick="loadFeatured()">⭐ Featured</button>
        <button id="btnMovies" class="tab" onclick="loadContent('movie')">Movies</button>
        <button id="btnSeries" class="tab" onclick="loadContent('tv')">Series</button>
    </div>

    <div id="moviesGrid" class="movie-grid"></div>

    <div class="footer-app-box" id="installContainer">
        <h3>GET MYTVPRO APP</h3>
        <p>For a faster and better experience, install our official app now!</p>
        <button id="installBtn" class="footer-install-btn">
            INSTALL APP / تحميل التطبيق
        </button>
    </div>

    <div id="videoPlayerContainer">
        <div class="player-wrapper" style="text-align: center;">
            <button class="back-btn" onclick="closePlayer()">BACK</button>
            <iframe id="mainPlayer" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // --- 1. إصلاح منطق زر التحميل (PWA Install) ---
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // منع المتصفح من إظهار النافذة التلقائية
            e.preventDefault();
            // حفظ الحدث ليتم استدعاؤه لاحقاً
            deferredPrompt = e;
            // إظهار حاوية الزر
            document.getElementById('installContainer').style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // إظهار نافذة التثبيت
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to the install prompt: ${outcome}`);
                // مسح المتغير بعد الاستخدام
                deferredPrompt = null;
            } else {
                // إذا لم يكن المتصفح جاهزاً بعد للتثبيت، نوجهه لرابط التطبيق كبديل
                window.location.href = "https://mytvpro.mytvpropagesdev.workers.dev/";
            }
        });

        window.addEventListener('appinstalled', () => {
            console.log('PWA was installed');
            document.getElementById('installContainer').style.display = 'none';
        });

        // --- 2. سكريبت التحميل والتشغيل الأساسي ---
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progress-bar');
            const splash = document.getElementById('splash-screen');
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(() => { splash.style.opacity = '0'; setTimeout(() => splash.style.visibility = 'hidden', 500); }, 300);
                } else {
                    width += Math.random() * 20;
                    if (width > 100) width = 100;
                    bar.style.width = width + '%';
                }
            }, 100);
        });

        let currentType = 'tv', currentLang = 'en';

        async function loadFeatured() {
            const featuredItems = [{id: 93405, type: 'tv'}, {id: 157336, type: 'movie'}, {id: 1396, type: 'tv'}, {id: 71446, type: 'tv'}];
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = "";
            for(let item of featuredItems) {
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/${item.type}/${item.id}?api_key=${window.API_KEY}&language=${currentLang}`);
                    const m = await res.json();
                    grid.innerHTML += `<div class="movie-card" onclick="openPlayer('${m.id}', '${item.type}')">
                        <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                        <div style="padding:5px; font-size:12px;">${m.title || m.name}</div>
                    </div>`;
                } catch(e) {}
            }
        }

        function openPlayer(id, type) {
            document.getElementById('mainPlayer').src = `https://vidsrc.me/embed/${type}?tmdb=${id}`;
            document.getElementById('videoPlayerContainer').style.display = 'block';
        }

        function closePlayer() {
            document.getElementById('videoPlayerContainer').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
        }

        window.onload = () => loadFeatured();
    </script>
</body>
